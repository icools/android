library:
  - title: Tools
    url: /tools/
    kicker: Toolchain
    description: 開發與測試時常用的 Android 工具入口，包含實用理由、適合情境與後續延伸主題。
  - title: Projects
    url: /projects/
    kicker: Case Study
    description: 收藏值得拆解研究的 Android app 與開源專案，作為功能、架構與體驗觀察樣本。
  - title: Debugging
    url: /debugging/
    kicker: Diagnose
    description: 聚焦問題定位與排查流程，整理 log、crash、ANR 與 WebView 等常見除錯方向。
  - title: Performance
    url: /performance/
    kicker: Optimize
    description: 用來累積 UI 卡頓、啟動速度、GPU、記憶體與渲染觀察的效能筆記入口。
  - title: Android
    url: /android/
    kicker: Platform
    description: 收納 Android 平台 API、背景工作與架構分層筆記，包含 Accessibility、Hilt、Worker、MVVM 等主題。
  - title: AI
    url: /ai/
    kicker: Intelligence
    description: 整理 AI 工具、LLM 模型、content engineering 與開發整合，涵蓋 OpenAI、Google、Mistral 等平台。
  - title: Kotlin
    url: /kotlin/
    kicker: Language
    description: 集中整理 Kotlin 語法、實務寫法，以及 Android 專案裡常遇到的語言模式。
  - title: Rust
    url: /rust/
    kicker: Language
    description: 整理 Rust 在 Android 上的整合方式、框架選型、NDK 實作與導入判斷。
  - title: Draft
    url: /draft/
    kicker: Staging
    description: 收納 AI 對談摘要、草稿心得與待整理內容，之後再交給 Codex 分類歸檔。
  - title: Workflow
    url: /workflow/
    kicker: Process
    description: 收納開發流程、測試流程與自動化習慣，讓日常工作流逐步沉澱成可重用清單。
  - title: Todo
    url: /todo/
    kicker: Inbox
    description: 還在消化中的主題暫存區，先留下值得追的方向，再逐步整理成正式文章。

references:
